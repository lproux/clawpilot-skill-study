workflow_id: WF-39
name: Multi-Thread Customer Conversation Synthesis
mode: Co-Work
actor: CSA/DSSP
skill: customer-meeting-prep-outreach-coach
tier: 4
scenario_count: 250
frequency: High
trigger: User has multiple active email threads with a customer and needs consolidated
  view
input: Multiple email threads, MSX state, prior commitments across threads, stakeholder
  participation per thread
routing:
  entry_skill: customer-meeting-prep-outreach-coach
  modules:
  - email-chat-context
  - follow-up-and-decisions
  handoffs:
  - target: pipeline-msx-hygiene-coach
    condition: MSX updates warranted from synthesis
output: Consolidated decision log, cross-thread commitment inventory, action list
  with thread attribution, MSX update proposals, superseded-commitment identification
intent_distribution:
  happy: 100
  adherence: 88
  assumption_stress: 38
  design_redesign: 25
failure_mode_count: 14
