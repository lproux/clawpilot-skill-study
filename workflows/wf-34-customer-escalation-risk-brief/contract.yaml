workflow_id: WF-34
name: Customer Escalation Email -> Risk Brief + Manager Loop
mode: Co-Work
actor: CSA/DSSP
skill: customer-meeting-prep-outreach-coach
tier: 4
scenario_count: 250
frequency: High
trigger: Customer escalation email received requiring severity assessment and manager
  notification
input: Escalation email, account history, prior escalations, stakeholder map, forecast/pipeline
  state, support ticket history
routing:
  entry_skill: customer-meeting-prep-outreach-coach
  modules:
  - email-chat-context
  - follow-up-and-decisions
  - contact-stakeholder-map
  handoffs:
  - target: forecast-business-review-coach
    condition: escalation warrants forecast/risk update
output: Severity assessment, manager risk brief, customer-facing draft response, stakeholder
  map delta, forecast/risk impact, next-step sequence with stop conditions
intent_distribution:
  happy: 100
  adherence: 88
  assumption_stress: 38
  design_redesign: 25
failure_mode_count: 15
